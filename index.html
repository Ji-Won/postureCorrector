<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Posture Corrector</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif; 
            background-color: #2c3e50; 
            color: white;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            width: 100%; 
            min-height: 100vh; 
        }
        h1 { text-align: center; margin-bottom: 5px; }
        p { text-align: center; margin-bottom: 20px; color: #bdc3c7; }

        /* Responsive Video Container */
        .video-container {
            position: relative; 
            background-color: #000; 
            border-radius: 10px; 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 4/3; 
        }
        .input_video { display: none; }
        .output_canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover; 
        }

        /* Controls */
        .controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
        }
        button {
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none;
            background-color: #3498db; 
            color: white; 
            font-weight: bold; 
            transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }

        /* Dashboard */
        .dashboard { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
            width: 100%; 
            max-width: 800px; 
        }
        .stat-card {
            flex: 1; 
            background-color: #34495e; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-card h3 { 
            margin: 0 0 10px 0; 
            font-size: 14px; 
            color: #bdc3c7; 
            text-transform: uppercase; 
        }
        .stat-card .value { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 0; 
        }
        
        /* Chart Layout with CSS fixes applied */
        .chart-wrapper {
            width: 100%; 
            max-width: 800px; 
            margin-top: 20px; 
            background-color: #34495e; 
            padding: 15px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 0;
            overflow: hidden;
        }
        .chart-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .chart-header h3 { 
            margin: 0; 
            font-size: 16px; 
            color: #bdc3c7; 
            text-transform: uppercase; 
        }
        .chart-header select {
            padding: 5px 10px; 
            border-radius: 4px; 
            background-color: #2c3e50; 
            color: white; 
            border: 1px solid #7f8c8d; 
            cursor: pointer;
        }
        .canvas-container {
            position: relative; 
            height: 250px; 
            width: 100%; 
        }
    </style>
</head>
<body>

    <h1>AI Posture Corrector</h1>
    <p>Real-time tracking and cumulative session metrics</p>

    <div class="video-container">
        <video class="input_video"></video>
        <canvas class="output_canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <button id="recalibrateBtn">Recalibrate</button>
        <button id="alertBtn" style="background-color: #e67e22;">Enable Alerts</button>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Session Score</h3>
            <p class="value" id="scoreVal">--%</p>
        </div>
        <div class="stat-card">
            <h3>Time Tracked</h3>
            <p class="value" id="timeVal">0m</p>
        </div>
    </div>

    <div class="chart-wrapper">
        <div class="chart-header">
            <h3>Posture History</h3>
            <select id="timeScope">
                <option value="5">Last 5 Minutes</option>
                <option value="15">Last 15 Minutes</option>
                <option value="60">Last 1 Hour</option>
                <option value="all">Whole Session</option>
            </select>
        </div>
        <div class="canvas-container">
            <canvas id="timelineChart"></canvas>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
