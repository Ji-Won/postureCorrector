<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Posture Corrector</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px; /* Gives breathing room on small screens */
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;
            margin-bottom: 20px;
        }

        /* --- THE RESPONSIVE MAGIC --- */
        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            
            /* This makes the container shrink/grow with the window... */
            width: 100%;
            /* ...but prevents it from getting comically large on big monitors */
            max-width: 800px; 
            /* Locks the box to a standard webcam shape */
            aspect-ratio: 4/3; 
        }

        .input_video {
            display: none; 
        }

        .output_canvas {
            /* Visually stretch to fill the responsive container perfectly */
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        /* --------------------------- */

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px; /* Adds clean spacing between buttons */
            flex-wrap: wrap; /* Allows buttons to stack on mobile */
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            transition: background-color 0.2s; /* Smooth hover effect */
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>AI Posture Corrector</h1>
    <p>Keep your ears aligned with your shoulders!</p>

    <div class="video-container">
        <video class="input_video"></video>
        <canvas class="output_canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <button id="recalibrateBtn">Recalibrate</button>
        <button id="alertBtn" style="background-color: #e67e22;">Enable Alerts</button>
    </div>

    <script src="app.js"></script>

</body>
</html>
